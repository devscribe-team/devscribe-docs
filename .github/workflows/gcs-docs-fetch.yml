name: GCS Docs Fetch

on:
  workflow_dispatch:
    inputs:
      gcs_bucket:
        description: "GCS bucket (default: user_docs-prod)"
        required: false
        type: string
      gcs_prefix:
        description: "Prefix (e.g., <userId>/docs). If empty and user_id is provided, uses <user_id>/docs"
        required: false
        type: string
      user_id:
        description: "User ID (used if gcs_prefix is empty)"
        required: false
        type: string

jobs:
  fetch-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install gcloud before using it
      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate (keep your current method, but don't print the key)
      - name: Setup Google Credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/gcp-key.json"
          echo "$GOOGLE_APPLICATION_CREDENTIALS" | base64 -d > "$KEY_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Authenticate with gcloud
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud config set project "$(jq -r '.project_id' "$GOOGLE_APPLICATION_CREDENTIALS")"

      - name: Verify gcloud
        run: gcloud --version

      - name: Download docs from GCS (mirror)
        env:
          BUCKET_IN: ${{ inputs.gcs_bucket }}
          PREFIX_IN: ${{ inputs.gcs_prefix }}
          USER_ID: ${{ inputs.user_id }}
        run: |
          set -euo pipefail
          BUCKET=${BUCKET_IN:-user_docs-prod}
          if [ -n "${PREFIX_IN:-}" ]; then
            PREFIX="$PREFIX_IN"
          elif [ -n "${USER_ID:-}" ]; then
            PREFIX="${USER_ID}/docs"
          else
            echo "Either gcs_prefix or user_id must be provided" >&2
            exit 1
          fi

          rm -rf gcs_docs
          mkdir -p gcs_docs
          echo "Mirroring gs://${BUCKET}/${PREFIX}/ -> gcs_docs/"
          # trailing slash => copy contents of prefix
          gsutil -m rsync -r -d "gs://${BUCKET}/${PREFIX}/" gcs_docs/

          echo "Downloaded tree:"
          find gcs_docs -print | sort || true

      - name: Mirror to repo docs/
        run: |
          set -euo pipefail
          rm -rf docs
          mkdir -p docs
          shopt -s dotglob
          cp -r gcs_docs/. docs
          echo "Repo docs/ now has:"
          find docs -print | sort

      - name: Commit and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update docs from gs://${{ inputs.gcs_bucket || 'user_docs-prod' }}/${{ inputs.gcs_prefix || format('{0}/docs', inputs.user_id) }}/"
          # Force push if you really want to override; be sure branch protections allow it
          git push origin "HEAD:${BRANCH}" --force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcs-docs
          path: gcs_docs