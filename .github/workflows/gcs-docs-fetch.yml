name: GCS Docs Fetch

on:
  workflow_dispatch:
    inputs:
      gcs_bucket:
        description: "GCS bucket (default: user_docs-prod)"
        required: false
        type: string
      gcs_prefix:
        description: "Prefix inside bucket (e.g., <userId>/docs). If empty and user_id is provided, uses <user_id>/docs"
        required: false
        type: string
      user_id:
        description: "User ID to fetch (used if gcs_prefix is empty)"
        required: false
        type: string

jobs:
  fetch-docs:
    name: Fetch docs from GCS
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify gcloud
        run: gcloud --version

      - name: Download docs from GCS
        env:
          BUCKET_IN: ${{ inputs.gcs_bucket }}
          PREFIX_IN: ${{ inputs.gcs_prefix }}
          USER_ID: ${{ inputs.user_id }}
        run: |
          set -euo pipefail
          # Resolve bucket and prefix with sensible defaults
          BUCKET=${BUCKET_IN:-}
          if [ -z "$BUCKET" ]; then BUCKET="user_docs-prod"; fi

          if [ -n "${PREFIX_IN:-}" ]; then
            PREFIX="$PREFIX_IN"
          elif [ -n "${USER_ID:-}" ]; then
            PREFIX="${USER_ID}/docs"
          else
            echo "Either gcs_prefix or user_id must be provided" >&2
            exit 1
          fi

          echo "RESOLVED_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "RESOLVED_PREFIX=$PREFIX" >> "$GITHUB_ENV"

          mkdir -p gcs_docs
          
          # Check if the prefix exists in the bucket
          echo "Checking if gs://${BUCKET}/${PREFIX} exists..."
          if gsutil ls "gs://${BUCKET}/${PREFIX}" >/dev/null 2>&1; then
            echo "Prefix exists, downloading files..."
            # Copy recursively from the prefix
            gsutil -m cp -r "gs://${BUCKET}/${PREFIX}/**" gcs_docs/ || {
              echo "Warning: Some files may not have been copied successfully"
            }
            echo "Downloaded contents from gs://${BUCKET}/${PREFIX} into ./gcs_docs"
          else
            echo "Warning: Prefix gs://${BUCKET}/${PREFIX} does not exist or is not accessible"
            echo "Creating empty gcs_docs directory for artifact upload"
          fi

          # Remove metadata/administrative files to mimic app behavior
          find gcs_docs -type f \( -name "*.metadata.json" -o -name "project-info.json" -o -name "metadata.json" \) -print -delete || true
          # Remove folder placeholder files (used only to represent empty folders in GCS)
          find gcs_docs -type f -name ".folder-placeholder.md" -print -delete || true
          # Remove empty files
          find gcs_docs -type f -size 0 -print -delete || true

      - name: Mirror into repo docs/ directory
        run: |
          set -euo pipefail
          mkdir -p docs
          rsync -a --delete gcs_docs/ docs/
          echo "Mirrored GCS docs into ./docs"

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
          RESOLVED_BUCKET: ${{ env.RESOLVED_BUCKET }}
          RESOLVED_PREFIX: ${{ env.RESOLVED_PREFIX }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(docs): mirror from GCS (${RESOLVED_BUCKET}/${RESOLVED_PREFIX})"
          git push origin "HEAD:${BRANCH}"

      - name: List downloaded files
        run: |
          echo "Contents of gcs_docs:";
          ls -laR gcs_docs || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcs-docs
          path: gcs_docs

